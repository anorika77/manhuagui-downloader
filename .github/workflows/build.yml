      - name: Sync Tauri npm packages with Rust crate versions
        run: |
          cd src-tauri
          # 从 Cargo.lock 提取版本（awk 模式：找到 "name = \"xxx\"" 行后，在接下来的行中找 "version = "）
          TAURI_VER=$(awk '/^name = "tauri"$/,/^version = /{if(/^version = /){gsub(/"/,"");print $NF;exit}}' Cargo.lock)
          DIALOG_VER=$(awk '/^name = "tauri-plugin-dialog"$/,/^version = /{if(/^version = /){gsub(/"/,"");print $NF;exit}}' Cargo.lock)
          OPENER_VER=$(awk '/^name = "tauri-plugin-opener"$/,/^version = /{if(/^version = /){gsub(/"/,"");print $NF;exit}}' Cargo.lock)
          cd ..
          echo "Extracted versions: tauri=$TAURI_VER dialog=$DIALOG_VER opener=$OPENER_VER"
          
          # 调试：如果某个版本为空，打印 Cargo.lock 中相关内容
          if [ -z "$TAURI_VER" ]; then
            echo "Debug: searching for 'tauri' in Cargo.lock"
            grep -A5 -E '^name = "tauri"$' src-tauri/Cargo.lock | head -10
          fi
          if [ -z "$DIALOG_VER" ]; then
            echo "Debug: searching for 'tauri-plugin-dialog' in Cargo.lock"
            grep -A5 -E '^name = "tauri-plugin-dialog"$' src-tauri/Cargo.lock | head -10
          fi
          if [ -z "$OPENER_VER" ]; then
            echo "Debug: searching for 'tauri-plugin-opener' in Cargo.lock"
            grep -A5 -E '^name = "tauri-plugin-opener"$' src-tauri/Cargo.lock | head -10
          fi
          
          # 必须全部非空
          if [ -z "$TAURI_VER" ] || [ -z "$DIALOG_VER" ] || [ -z "$OPENER_VER" ]; then
            echo "ERROR: Could not extract versions from Cargo.lock"
            exit 1
          fi
          
          # 用 jq 更新 package.json
          mv package.json package.json.bak
          jq --arg tauri "$TAURI_VER" \
             --arg dialog "$DIALOG_VER" \
             --arg opener "$OPENER_VER" \
             '.devDependencies["@tauri-apps/cli"] = "^\($tauri)" |
              .dependencies["@tauri-apps/api"] = "^\($tauri)" |
              .dependencies["@tauri-apps/plugin-dialog"] = "^\($dialog)" |
              .dependencies["@tauri-apps/plugin-opener"] = "^\($opener)"' \
             package.json.bak > package.json
          echo "Updated package.json:"
          cat package.json
