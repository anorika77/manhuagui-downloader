name: Build Tauri App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Tauri requires webkit2gtk and others)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Linux)
        run: |
          cargo tauri build --bundles deb,appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''  # 如果需要签名可以设置

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifact (deb)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload artifact (raw binary)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-binary
          path: src-tauri/target/release/manhuagui-downloader
