name: Build Tauri App & Package for FNOS (fpk)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Fix package.json versions (if needed)
        run: |
          cp package.json package.json.bak
          jq '.devDependencies["@tauri-apps/cli"] = "2.2.0" |
              .dependencies["@tauri-apps/api"] = "2.2.0" |
              .dependencies["@tauri-apps/plugin-dialog"] = "2.2.0" |
              .dependencies["@tauri-apps/plugin-opener"] = "2.2.3"' \
            package.json.bak > package.json.new
          mv package.json.new package.json

      - name: Install Node dependencies
        run: pnpm install

      - name: Build Tauri app (Linux)
        run: pnpm tauri build --bundles deb,appimage

      # -------------------- 改用从源码编译 fnpkg --------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build fnpkg from source
        run: |
          git clone https://github.com/FNEX/fnpkg.git /tmp/fnpkg
          cd /tmp/fnpkg
          go build -o /usr/local/bin/fnpkg .
          chmod +x /usr/local/bin/fnpkg
          # 验证安装成功
          fnpkg --help 2>&1 || true
      # ----------------------------------------------------------------

      - name: Prepare fpk package directory
        run: |
          PKG_BASE="${{ runner.temp }}/fpk-package"
          mkdir -p "$PKG_BASE/usr/local/bin"
          mkdir -p "$PKG_BASE/usr/share/applications"
          mkdir -p "$PKG_BASE/usr/share/icons/hicolor/256x256/apps"

          # 复制二进制
          cp src-tauri/target/release/manhuagui-downloader "$PKG_BASE/usr/local/bin/"

          # 创建桌面文件（使用 printf 避免 heredoc 缩进问题）
          {
            printf '[Desktop Entry]\n'
            printf 'Name=Manhuagui Downloader\n'
            printf 'Exec=/usr/local/bin/manhuagui-downloader\n'
            printf 'Icon=manhuagui-downloader\n'
            printf 'Type=Application\n'
            printf 'Categories=Utility;Network;\n'
          } > "$PKG_BASE/usr/share/applications/manhuagui-downloader.desktop"

          # 复制图标（如果存在）
          if [ -f "src-tauri/icons/icon.png" ]; then
            cp "src-tauri/icons/icon.png" "$PKG_BASE/usr/share/icons/hicolor/256x256/apps/manhuagui-downloader.png"
          fi

          # 创建 run.sh（同上，用 printf）
          {
            printf '#!/bin/bash\n'
            printf 'exec /usr/local/bin/manhuagui-downloader "$@"\n'
          } > "$PKG_BASE/run.sh"
          chmod +x "$PKG_BASE/run.sh"

          # 创建 manifest.json（用 jq 生成，专业且避免引号问题）
          jq -n \
            --arg name "manhuagui-downloader" \
            --arg version "0.1.0" \
            --arg description "漫画下载工具 - Tauri 桌面应用" \
            --arg maintainer "your-email@example.com" \
            --arg arch "amd64" \
            --arg runtime "run.sh" \
            --arg entry "run.sh" \
            '{
              "name": $name,
              "version": $version,
              "description": $description,
              "maintainer": $maintainer,
              "arch": $arch,
              "runtime": $runtime,
              "entry": $entry,
              "dependencies": [],
              "environment": {}
            }' > "$PKG_BASE/manifest.json"

          echo "--- Package content ---"
          find "$PKG_BASE" -type f

      - name: Create fpk package
        run: |
          fnpkg create \
            --name manhuagui-downloader \
            --version 0.1.0 \
            --description "漫画下载工具 - Tauri 桌面应用" \
            --maintainer "your-email@example.com" \
            --arch amd64 \
            --source "${{ runner.temp }}/fpk-package" \
            --output manhuagui-downloader.fpk

          ls -lh manhuagui-downloader.fpk

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-fnos-fpk
          path: manhuagui-downloader.fpk

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-binary
          path: src-tauri/target/release/manhuagui-downloader
