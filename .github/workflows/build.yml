name: Build Tauri App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 使用 cargo metadata 获取精确版本，并用 jq 同步 package.json
      - name: Sync Tauri npm packages with Rust crate versions
        run: |
          # 获取 Rust crate 的精确版本（仅本项目依赖的顶层包）
          cd src-tauri
          CRATES_JSON=$(cargo metadata --no-deps --format-version 1 2>/dev/null)
          cd ..
          
          # 提取版本
          TAURI_VER=$(echo "$CRATES_JSON" | jq -r '.packages[] | select(.name=="tauri") | .version')
          DIALOG_VER=$(echo "$CRATES_JSON" | jq -r '.packages[] | select(.name=="tauri-plugin-dialog") | .version')
          OPENER_VER=$(echo "$CRATES_JSON" | jq -r '.packages[] | select(.name=="tauri-plugin-opener") | .version')
          
          echo "Cargo versions: tauri=$TAURI_VER dialog=$DIALOG_VER opener=$OPENER_VER"
          
          if [ -z "$TAURI_VER" ] || [ -z "$DIALOG_VER" ] || [ -z "$OPENER_VER" ]; then
            echo "ERROR: Could not extract versions from Cargo metadata"
            exit 1
          fi
          
          # 用 jq 更新 package.json
          mv package.json package.json.bak
          jq --arg tauri "$TAURI_VER" \
             --arg dialog "$DIALOG_VER" \
             --arg opener "$OPENER_VER" \
             '.devDependencies["@tauri-apps/cli"] = "^\($tauri)" |
              .dependencies["@tauri-apps/api"] = "^\($tauri)" |
              .dependencies["@tauri-apps/plugin-dialog"] = "^\($dialog)" |
              .dependencies["@tauri-apps/plugin-opener"] = "^\($opener)"' \
             package.json.bak > package.json
          echo "Updated package.json:"
          cat package.json

      - name: Install Node dependencies
        run: pnpm install

      - name: Build Tauri app (Linux)
        run: pnpm tauri build --bundles deb,appimage

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifact (deb)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload artifact (raw binary)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-binary
          path: src-tauri/target/release/manhuagui-downloader
