name: Build Tauri App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Sync Tauri npm packages with Rust crate versions
        run: |
          # Extract versions from Cargo.lock
          TAURI_VERSION=$(grep -A2 'name = "tauri"' src-tauri/Cargo.lock | grep 'version =' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PLUGIN_DIALOG_VERSION=$(grep -A2 'name = "tauri-plugin-dialog"' src-tauri/Cargo.lock | grep 'version =' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PLUGIN_OPENER_VERSION=$(grep -A2 'name = "tauri-plugin-opener"' src-tauri/Cargo.lock | grep 'version =' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          
          echo "Cargo versions: tauri=$TAURI_VERSION plugin-dialog=$PLUGIN_DIALOG_VERSION plugin-opener=$PLUGIN_OPENER_VERSION"
          
          # Update package.json with matching versions
          mv package.json package.json.bak
          jq --arg tauri "$TAURI_VERSION" \
             --arg dialog "$PLUGIN_DIALOG_VERSION" \
             --arg opener "$PLUGIN_OPENER_VERSION" \
             '.devDependencies["@tauri-apps/cli"] = "^\($tauri)" |
              .dependencies["@tauri-apps/api"] = "^\($tauri)" |
              .dependencies["@tauri-apps/plugin-dialog"] = "^\($dialog)" |
              .dependencies["@tauri-apps/plugin-opener"] = "^\($opener)"' \
             package.json.bak > package.json
          echo "Updated package.json:"
          cat package.json

      - name: Install Node dependencies
        run: pnpm install

      - name: Build Tauri app (Linux)
        run: pnpm tauri build --bundles deb,appimage

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifact (deb)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload artifact (raw binary)
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64-binary
          path: src-tauri/target/release/manhuagui-downloader
