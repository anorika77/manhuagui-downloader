name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (inferred)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Build binary with PyInstaller
        run: |
          pip install pyinstaller
          # 递归查找所有包含 if __name__ 的 Python 文件
          ENTRY=$(find . -name "*.py" -type f -exec grep -l "if __name__" {} + 2>/dev/null | head -1)
          if [ -n "$ENTRY" ]; then
            echo "Found entry point: $ENTRY"
            pyinstaller --onefile --name manhuagui-downloader "$ENTRY"
          else
            echo "No entry point with __name__ found. Trying common file names..."
            for f in "main.py" "app.py" "cli.py" "run.py" "start.py" \
                     "src/manhuagui_downloader/main.py" \
                     "src/manhuagui_downloader/__main__.py" \
                     "manhuagui_downloader.py"; do
              if [ -f "$f" ]; then
                echo "Using $f as entry"
                pyinstaller --onefile --name manhuagui-downloader "$f"
                break
              fi
            done
          fi
          # 检查产物是否生成
          if [ ! -f "dist/manhuagui-downloader" ]; then
            echo "Failed to create binary. Current directory structure:"
            find . -name "*.py" -type f
            exit 1
          fi
          ls -la dist/

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64
          path: dist/manhuagui-downloader

  docker:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
