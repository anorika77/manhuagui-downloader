name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f Pipfile ]; then
            pip install pipenv
            pipenv install --dev --system
          elif [ -f pyproject.toml ]; then
            pip install .  # 如果项目有 setup.py/pyproject.toml 构建配置
          else
            echo "No dependency file found, trying pip install ."
            pip install .
          fi

      - name: Build binary with PyInstaller
        run: |
          pip install pyinstaller
          # 自动寻找入口文件（如果 main.py 在 src 下）
          if [ -f "src/manhuagui_downloader/main.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader src/manhuagui_downloader/main.py
          elif [ -f "main.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader main.py
          else
            echo "Could not find entry point, trying to guess..."
            # 尝试用项目名称作为模块执行
            pyinstaller --onefile --name manhuagui-downloader -c src/manhuagui_downloader
          fi
          # 确认产物
          ls -la dist/

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64
          path: dist/manhuagui-downloader

  docker:
    runs-on: ubuntu-latest
    needs: package  # 等待打包完成（其实不需要，可以直接用源代码构建）
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64  # 明确指定 x86 架构
