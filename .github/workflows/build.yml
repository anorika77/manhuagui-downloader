name: Build Tauri App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Fix package.json versions
        run: |
          mv package.json package.json.bak
          jq '.devDependencies["@tauri-apps/cli"] = "^2.2.0" |
              .dependencies["@tauri-apps/api"] = "^2.2.0" |
              .dependencies["@tauri-apps/plugin-dialog"] = "^2.2.0" |
              .dependencies["@tauri-apps/plugin-opener"] = "^2.2.3"' \
            package.json.bak > package.json
          cat package.json
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm tauri build --bundles deb,appimage
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/manhuagui-downloader
