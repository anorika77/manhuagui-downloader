name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (inferred)
        run: |
          python -m pip install --upgrade pip
          # 由于项目没有依赖文件，直接安装常用包（可修改）
          pip install requests beautifulsoup4 lxml

      - name: Build binary with PyInstaller
        run: |
          pip install pyinstaller
          # 尝试多种可能的入口文件
          if [ -f "src/manhuagui_downloader/main.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader src/manhuagui_downloader/main.py
          elif [ -f "main.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader main.py
          elif [ -f "cli.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader cli.py
          elif [ -f "app.py" ]; then
            pyinstaller --onefile --name manhuagui-downloader app.py
          else
            # 如果所有文件都没有，尝试扫描所有 .py 文件寻找带有 if __name__ == '__main__' 的
            echo "Searching for entry point..."
            ENTRY=$(grep -rl "if __name__" *.py 2>/dev/null | head -1)
            if [ -n "$ENTRY" ]; then
              pyinstaller --onefile --name manhuagui-downloader "$ENTRY"
            else
              echo "Cannot find entry point. Please specify the main script manually."
              exit 1
            fi
          fi
          ls -la dist/

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: manhuagui-downloader-linux-amd64
          path: dist/manhuagui-downloader

  docker:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
